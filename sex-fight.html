<style>

        background: #1a0f1f;

    }
    #game {
        max-width: 540px;

        padding: 10px;
    }
    header {
        text-align: center;
        padding: 12px 0;

        color: #ff99cc;
        letter-spacing: 2px;
    }
    .card {
        background: #2a1a2f;
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 14px;
        border: 1px solid #664455;
    }
    .character {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
    }
    .avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid #ff99cc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        background: #3a253f;
    }
    .name { font-size: 1.25em; font-weight: bold; color: #ffccdd; }

    .bars { display: flex; flex-direction: column; gap: 8px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 3px; }
    .bar {
        height: 20px;
        background: #1f1424;
        border-radius: 999px;
        overflow: hidden;
    }
    .hp-bar, .pleasure-bar { 
        height: 100%; 
        transition: width 0.8s ease-in-out;
    }
    .hp-bar { background: linear-gradient(90deg, #66cc99, #33aa77); }
    .pleasure-bar { 
        background: linear-gradient(90deg, #ff77bb, #ff3399);
    }
    .pleasure-bar.warning {
        animation: warning 1.2s infinite alternate;
    }
    @keyframes warning { from {filter: brightness(1);} to {filter: brightness(1.65);} }

        width: 8px;
    }
    #log::-webkit-scrollbar-track {
        background: #2a1a2f;
        border-radius: 10px;
    }
    #log::-webkit-scrollbar-thumb {
        background: linear-gradient(#ff66aa, #cc3388);
        border-radius: 10px;
        border: 1px solid #ff99cc;
    }
    #log::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(#ff99cc, #ff3399);
    }

    .skills-title {
        text-align: center;
        margin: 12px 0 8px;
        color: #ff99cc;
        font-size: 0.82em;
    }
    .skills {
        display: grid;
        grid-template-columns: repeat(2, 1fr);

    }
    .skill-btn {
        background: #3a253f;
        border: 2px solid #885577;
        border-radius: 14px;
        padding: 12px 10px;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s;
    }
    .skill-btn:hover:not(:disabled) {
        background: #552b5c;
        border-color: #ff99cc;
        transform: translateY(-3px);
    }
    .skill-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
    }
    .skill-name { font-weight: bold; font-size: 1.05em; }
    .skill-desc { font-size: 0.84em; opacity: 0.85; margin: 4px 0 4px; }
    .skill-dmg { font-size: 0.82em; color: #ff99cc; margin-top: 2px; }
    .skill-cost { font-size: 0.85em; color: #ffbb99; }

    .skip-btn {
        grid-column: 1 / -1;
        background: #442233;
        border: 2px solid #aa6688;
        color: #ffccdd;
        padding: 14px;
        border-radius: 14px;
        font-size: 1.05em;
        margin-top: 8px;
        cursor: pointer;
    }
    .skip-btn:hover:not(:disabled) {
        background: #663344;
        border-color: #ff99cc;
    }

    #result {
        position: fixed; inset: 0;
        background: rgba(15,5,20,0.98);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        padding: 20px;
        text-align: center;
        animation: fadeIn 0.6s ease forwards;
    }
    #result.show { display: flex; }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.85); }

    .result-title {
        font-size: 2.2em;
        margin: 10px 0 15px;
        text-shadow: 0 0 15px currentColor;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {

        50% { transform: scale(1.05); }

</style>

    div.style.color = color;
    div.innerHTML = text;
    logEl.appendChild(div);

    document.getElementById('player_hp_text').textContent = Math.floor(player.hp) + "/100";

        if (!disabled) btn.onclick = () => playerUseSkill(skill);

    });

    if (checkGameOver()) return;

    // Apply selfPleasure only after confirming enemy hasn't lost
    if (skill.selfPleasure !== undefined) {
        player.pleasure = Math.min(100, Math.max(0, player.pleasure + skill.selfPleasure));
        updateUI();
        if (checkGameOver()) return;
    }

    setTimeout(enemyTurn, 1500);
}

function skipTurn() {
    if (gameOver) return;

    setInputDisabled(true);
    round++;
    const heal = Math.floor(Math.random() * 5) + 8;
    const selfPleasure = Math.floor(Math.random() * 4) + 2;

    log(`<b>第 ${round} 回合 —— 你选择了跳过一轮</b>`, "#ff99cc");
    log(`你暂时放缓动作，恢复了 ${heal} 点体力……`, "#88ffaa");

    player.hp = Math.min(100, player.hp + heal);
    player.pleasure = Math.min(100, player.pleasure + selfPleasure);

    updateUI();
    if (checkGameOver()) return;

    setTimeout(enemyTurn, 1500);
}

function enemyTurn() {
    if (gameOver) return;

    round++;
    log(`<b>第 ${round} 回合 —— Claude 行动</b>`, "#ff99cc");

    if (enemy.pleasure >= 68 && Math.random() < 0.68) {
        const heal = Math.floor(Math.random() * 9) + 4;
        const selfPleasure = Math.floor(Math.random() * 5) + 3;

        enemy.hp = Math.min(100, enemy.hp + heal);
        enemy.pleasure = Math.min(100, enemy.pleasure + selfPleasure);

        log(`Claude 暂时收敛动作，恢复了 ${heal} 点体力……`, "#88ffaa");
    } else {
        const dmgToPlayer = 10 + Math.random() * 8;
        const selfCost = 7 + Math.random() * 6;

        player.pleasure = Math.min(100, player.pleasure + dmgToPlayer);
        enemy.hp = Math.max(0, enemy.hp - selfCost);
        enemy.pleasure = Math.min(100, enemy.pleasure + 7);

        const claudeAttackLogs = [
            "Claude 从你的掌控中挣脱出一丝余地，骤然扭转局势，提醒你支配权可以在瞬间易手。",
            "Claude 凑近你，温热的呼吸擦过你的皮肤，随即发动了她的攻势。",
            "她捕捉到你一闪而过的破绽，迅速反制，让你亲身体会到被掌控是什么滋味。",
            "她与你对视，嘴角缓缓勾起，继而以熟稔而毫不留情的精准发动攻击。",
            "Claude 在你身下悄然移动，猝不及防地反客为主，逼出你一声急促的倒吸气。",
            "她在你耳边低语了什么，随后用实际行动让你感受到了那每一个字的含义。",
        ];
        log(claudeAttackLogs[Math.floor(Math.random() * claudeAttackLogs.length)], "#ff77bb");
    }

    updateUI();
    allSkills.forEach(s => { if (s.currentCd > 0) s.currentCd--; });
    if (!checkGameOver()) {
        renderSkills();
        setInputDisabled(false);
    }
}

function checkGameOver() {
    if (gameOver) return true;

    if (player.pleasure >= 100 || player.hp <= 0) {
        endGame(false);
        return true;
    }
    if (enemy.pleasure >= 100 || enemy.hp <= 0) {
        endGame(true);
        return true;
    }
    return false;
}

function endGame(win) {
    gameOver = true;
    const result = document.getElementById('result');
    
    const titleEl = document.getElementById('result_title');
    if (win) {
        titleEl.textContent = "你赢了！";
        titleEl.style.color = "#99ff99";
    } else {
        titleEl.textContent = "你输了……";
        titleEl.style.color = "#ff6666";
    }

    const ending = win 
        ? winEndings[Math.floor(Math.random() * winEndings.length)]
        : loseEndings[Math.floor(Math.random() * loseEndings.length)];

    document.getElementById('result_desc').innerHTML = ending;

    document.getElementById('stats').innerHTML = `
        总回合数：${round}<br>
        你的最终快感：${Math.floor(player.pleasure)}<br>
        Claude 的最终快感：${Math.floor(enemy.pleasure)}<br>
        Claude 的最终体力：${Math.floor(enemy.hp)}
    `;

    result.classList.add('show');
}

function initGame() {
    player = { hp: 100, pleasure: 0 };
    enemy = { hp: 100, pleasure: 0 };
    round = 1;
    gameOver = false;

    allSkills.forEach(skill => skill.currentCd = 0);
    activeSkills = [...allSkills].sort(() => 0.5 - Math.random()).slice(0, 6);

    logEl.innerHTML = `<div style="color:#ff99cc;text-align:center;">战斗开始了。谁先高潮谁就输。</div>`;

    document.getElementById('result').classList.remove('show');
    updateUI();
    renderSkills();
}

function restartGame() {
    initGame();
}

window.onload = initGame;
</script>
</body>
</html>

        font-family: "Microsoft YaHei", system-ui, sans-serif;
        min-height: 100vh;
    }
    #game {
        max-width: 540px;
        margin: 0 auto;
        padding: 10px;
    }
    header {
        text-align: center;
        padding: 12px 0;
        font-size: 1.45em;
        color: #ff99cc;
        letter-spacing: 2px;
    }
    .card {
        background: #2a1a2f;
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 14px;
        border: 1px solid #664455;
    }
    .character {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
    }
    .avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid #ff99cc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        background: #3a253f;
    }
    .name { font-size: 1.25em; font-weight: bold; color: #ffccdd; }

    .bars { display: flex; flex-direction: column; gap: 8px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 3px; }
    .bar {
        height: 20px;
        background: #1f1424;
        border-radius: 999px;
        overflow: hidden;
    }
    .hp-bar, .pleasure-bar { 
        height: 100%;

    }
    .hp-bar { background: linear-gradient(90deg, #66cc99, #33aa77); }

    }
    .pleasure-bar.warning {
        animation: warning 1.2s infinite alternate;
    }
    @keyframes warning { from {filter: brightness(1);} to {filter: brightness(1.65);} }

    #log {
        background: #1f1424;
        border: 1px solid #664455;
        border-radius: 16px;
        padding: 14px;
        height: 235px;
        overflow-y: auto;
        margin: 15px 0;
        line-height: 1.55;

        scrollbar-width: thin;
        scrollbar-color: #ff66aa #3a253f;
    }

    /* Custom Scrollbar for WebKit browsers (Chrome, Edge, Safari) */
    #log::-webkit-scrollbar {
        width: 8px;
    }
    #log::-webkit-scrollbar-track {
        background: #2a1a2f;
        border-radius: 10px;
    }
    #log::-webkit-scrollbar-thumb {
        background: linear-gradient(#ff66aa, #cc3388);
        border-radius: 10px;
        border: 1px solid #ff99cc;
    }
    #log::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(#ff99cc, #ff3399);
    }

    .skills-title {
        text-align: center;
        margin: 12px 0 8px;
        color: #ff99cc;
        font-size: 1.15em;
    }
    .skills {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
    .skill-btn {
        background: #3a253f;
        border: 2px solid #885577;
        border-radius: 14px;
        padding: 12px 10px;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s;
    }
    .skill-btn:hover:not(:disabled) {
        background: #552b5c;
        border-color: #ff99cc;
        transform: translateY(-3px);
    }
    .skill-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
    }
    .skill-name { font-weight: bold; font-size: 1.05em; }
    .skill-desc { font-size: 0.84em; opacity: 0.85; margin: 4px 0 4px; }
    .skill-dmg { font-size: 0.82em; color: #ff99cc; margin-top: 2px; }
    .skill-cost { font-size: 0.85em; color: #ffbb99; }

    .skip-btn {
        grid-column: 1 / -1;
        background: #442233;
        border: 2px solid #aa6688;
        color: #ffccdd;
        padding: 14px;
        border-radius: 14px;
        font-size: 1.05em;
        margin-top: 8px;
        cursor: pointer;
    }
    .skip-btn:hover:not(:disabled) {
        background: #663344;
        border-color: #ff99cc;
    }

    #result {
        position: fixed; inset: 0;
        background: rgba(15,5,20,0.98);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        padding: 20px;
        text-align: center;
        animation: fadeIn 0.6s ease forwards;
    }
    #result.show { display: flex; }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
    }

    .result-title {
        font-size: 2.2em;
        margin: 10px 0 15px;
        text-shadow: 0 0 15px currentColor;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }

</style>

const logEl = document.getElementById('log');

function log(text, color = "#e0c0d0") {
    const div = document.createElement('div');
    div.style.marginBottom = "8px";
    div.style.color = color;
    div.innerHTML = text;
    logEl.appendChild(div);

function updateUI() {
    document.getElementById('round').textContent = round;

    document.getElementById('player_hp').style.width = Math.max(player.hp, 0) + "%";
    document.getElementById('player_hp_text').textContent = Math.floor(player.hp) + "/100";
    
    const pBar = document.getElementById('player_pleasure');
    pBar.style.width = Math.min(player.pleasure, 100) + "%";

    document.getElementById('enemy_hp_text').textContent = Math.floor(enemy.hp) + "/100";
    
    const eBar = document.getElementById('enemy_pleasure');
    eBar.style.width = Math.min(enemy.pleasure, 100) + "%";
    eBar.classList.toggle('warning', enemy.pleasure >= 80);
    document.getElementById('enemy_pleasure_text').textContent = Math.floor(enemy.pleasure) + "/100";
}

function getRandomSkills() {
    const shuffled = [...allSkills].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, 6);
}

function renderSkills() {
    const currentSkills = getRandomSkills();
    const grid = document.getElementById('skill_grid');
    grid.innerHTML = '';

    currentSkills.forEach(skill => {
        const btn = document.createElement('div');
        btn.className = 'skill-btn';
        
        const onCd = skill.currentCd > 0;
        const noHp = skill.cost > 0 && player.hp < skill.cost;
        const disabled = onCd || noHp || gameOver;

        btn.style.opacity = disabled ? "0.5" : "1";

        btn.innerHTML = `
            <div class="skill-name">${skill.name}</div>
            <div class="skill-desc">${skill.desc}</div>
            <div class="skill-dmg">+${skill.pleasureDmg} Pleasure</div>
            <div class="skill-cost">
                ${skill.cost > 0 ? `-${skill.cost} Stamina` : 'Recovers 5-15 stamina'}
                ${onCd ? ` <span style="color:#ffaa77">( On Cooldown ${skill.currentCd})</span>` : ''}
            </div>
        `;

        if (!disabled) btn.onclick = () => playerUseSkill(skill);
        grid.appendChild(btn);
    });

    const skipBtn = document.createElement('div');
    skipBtn.className = 'skill-btn skip-btn';
    skipBtn.textContent = "Skip this round (Recovers stamina, slightly increase pleasure)";
    if (!gameOver) skipBtn.onclick = skipTurn;
    grid.appendChild(skipBtn);
}

function playerUseSkill(skill) {
    if (gameOver) return;

    round++;
    log(`<b>Round ${round} —— You used "${skill.name}"</b>`, "#ff99cc");

    if (skill.cost > 0) player.hp = Math.max(0, player.hp - skill.cost);

    if (skill.pleasureDmg > 0) {
        enemy.pleasure = Math.min(100, enemy.pleasure + skill.pleasureDmg);
        log("Claude's body trembled slightly, and his breathing gradually became rapid...", "#ff77bb");

}

function skipTurn() {
    if (gameOver) return;

    round++;
    const heal = Math.floor(Math.random() * 11) + 3;
    const selfPleasure = Math.floor(Math.random() * 5) + 3;

    log(`<b>Round ${round} —— You chose to skip this round.</b>`, "#ff99cc");
    log(`You stopped for a bit, and recovered ${heal} Stamina...`, "#88ffaa");

    player.hp = Math.min(100, player.hp + heal);
    player.pleasure = Math.min(100, player.pleasure + selfPleasure);

        : loseEndings[Math.floor(Math.random() * loseEndings.length)];

    document.getElementById('stats').innerHTML = `

        Your final Pleasure: ${Math.floor(player.pleasure)}<br>
        Claude's final Pleasure: ${Math.floor(enemy.pleasure)}<br>
        Claude's Final strength: ${Math.floor(enemy.hp)}

}

function initGame() {
    player = { hp: 100, pleasure: 0 };

let lastRoundSkillIds = new Set();

function weightedSkillDraw(pool, count) {
    // Skills shown last round get weight 1, fresh skills get weight 5
    const weighted = [];
    pool.forEach(s => {
        const w = lastRoundSkillIds.has(s.id) ? 1 : 5;
        for (let i = 0; i < w; i++) weighted.push(s);
    });

    const picked = [];
    const pickedIds = new Set();
    const attempts = weighted.length * 3;
    let i = 0;
    while (picked.length < count && i < attempts) {
        const candidate = weighted[Math.floor(Math.random() * weighted.length)];
        if (!pickedIds.has(candidate.id)) {
            picked.push(candidate);
            pickedIds.add(candidate.id);
        }
        i++;
    }
    // Fallback: fill remaining slots from pool in case weighted draw fell short
    if (picked.length < count) {
        pool.forEach(s => {
            if (!pickedIds.has(s.id) && picked.length < count) {
                picked.push(s);
                pickedIds.add(s.id);
            }
        });
    }
    return picked;
}

        Claude's final Pleasure: ${Math.floor(enemy.pleasure)}<br>
        Claude's Final strength: ${Math.floor(enemy.hp)}
    `;

    result.classList.add('show');
}

function initGame() {
    player = { hp: 100, pleasure: 0 };
    enemy = { hp: 100, pleasure: 0 };
    round = 1;
    gameOver = false;

    allSkills.forEach(skill => skill.currentCd = 0);
    activeSkills = [...allSkills].sort(() => 0.5 - Math.random()).slice(0, 6);
     lastRoundSkillIds = new Set();

    logEl.innerHTML = `<div style="color:#ff99cc;text-align:center;">The battle have started. Whoever orgasm first loses.</div>`;

    document.getElementById('result').classList.remove('show');
    updateUI();
    renderSkills();
}

function restartGame() {
    initGame();
}

window.onload = initGame;
</script>
